{{define "cluster_table_data.html"}}
<div id="cluster-table-data"
     hx-get="/ui/partials/clusters"
     hx-trigger="every 5s"
     hx-swap="morph"
     class="rounded-sm border border-gray-800 bg-gray-900 p-6">
    <h2 class="text-xl font-semibold mb-4">Clusters</h2>

    {{if .}}
    <div style="overflow-x: auto; overflow-y: visible;">
        <table class="card-table w-full text-sm">
            <thead class="text-left border-b border-gray-800">
                <tr>
                    <th class="pb-3 font-semibold text-gray-400 w-8"></th>
                    <th class="pb-3 font-semibold text-gray-400">Name</th>
                    <th class="pb-3 font-semibold text-gray-400">Chart Version</th>
                    <th class="pb-3 font-semibold text-gray-400">Kubernetes Version</th>
                    <th class="pb-3 font-semibold text-gray-400">Talos Version</th>
                    <th class="pb-3 font-semibold text-gray-400 text-right"></th>
                </tr>
            </thead>
            <tbody>
                {{range .}}
                <tr class="border-b border-gray-800 hover:bg-gray-800/50 cursor-pointer" data-cluster-name="{{.Name}}" role="link" tabindex="0" onclick="window.location='/ui/clusters/{{.Name}}'" onkeydown="if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); window.location='/ui/clusters/{{.Name}}'; }">
                    <td class="py-4 pl-4">
                        <button type="button" class="health-indicator inline-flex items-center cursor-help border-0 bg-transparent p-0 m-0 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-gray-900 rounded" data-cluster="{{.Name}}" aria-label="Cluster health status" onclick="event.stopPropagation()">
                            <span class="health-icon text-gray-500">●</span>
                        </button>
                    </td>
                    <td class="py-4" data-label="Name">
                        <span class="font-medium">{{.Name}}</span>
                    </td>
                    <td class="py-4" data-label="Chart Version">
                        <code class="px-2 py-1 bg-gray-800 rounded text-xs">{{.ChartVersion}}</code>
                    </td>
                    <td class="py-4" data-label="Kubernetes Version">
                        <code class="px-2 py-1 bg-gray-800 rounded text-xs">{{.KubernetesVersion}}</code>
                    </td>
                    <td class="py-4" data-label="Talos Version">
                        <code class="px-2 py-1 bg-gray-800 rounded text-xs">{{.TalosVersion}}</code>
                    </td>
                    <td class="py-4 text-right" data-label="">
                        <div class="flex gap-2 justify-end">
                            <button
                                onclick="event.stopPropagation(); copyClusterKubeconfig('{{.Name}}')"
                                class="inline-flex items-center justify-center gap-2 rounded-sm text-sm font-medium transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent border border-gray-700 bg-gray-800 hover:bg-gray-700 hover:text-white h-8 px-3"
                                title="Copy kubeconfig"
                            >
                                {{template "icon_copy.html"}}
                                <span class="hidden sm:inline">Copy</span>
                            </button>
                            <button
                                onclick="event.stopPropagation(); downloadClusterKubeconfig('{{.Name}}')"
                                class="inline-flex items-center justify-center gap-2 rounded-sm text-sm font-medium transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent bg-accent text-gray-950 hover:bg-accent-glow hover:shadow-lg h-8 px-3"
                                title="Download kubeconfig"
                            >
                                {{template "icon_download.html"}}
                                <span class="hidden sm:inline">Download</span>
                            </button>
                        </div>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
    {{else}}
    <div class="text-center py-12 text-gray-500">
        <p class="text-lg">No clusters found</p>
        <p class="text-sm mt-2">Clusters will appear here once they are created</p>
    </div>
    {{end}}
</div>
{{end}}
