{{define "content"}}
<div data-page-title="Dashboard">
    <div id="results">
        <!-- Hero Header -->
        <div class="mb-8 flex items-center gap-4">
            <div class="flex flex-col items-center">
                <img src="/ui/public/kommodity-logo.jpeg" alt="Kommodity Logo" class="h-16 w-16 object-contain mb-2 cursor-pointer hover:opacity-80 transition-opacity" onclick="window.location.href='/ui'" />
                <a href="https://github.com/kommodity-io/kommodity/releases/tag/{{.Version}}" target="_blank" rel="noopener noreferrer" class="text-sm text-gray-500 hover:text-accent transition-colors">{{.Version}}</a>
            </div>
            <div>
                <h1 class="text-4xl font-bold mb-2">Kommodity UI</h1>
                <p class="text-xl text-gray-400">A single binary to power the sovereign backbone of your digital infrastructure.</p>
            </div>
        </div>

        <!-- Kubeconfig Section -->
        {{template "kubeconfig_section.html" .KubeconfigSection}}

        <!-- Metrics Cards -->
        {{template "metrics_cards.html" .Metrics}}

        <!-- Cluster List -->
        {{template "cluster_table.html" .Clusters}}
    </div>
</div>
{{end}}
