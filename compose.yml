services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: kommodity
      POSTGRES_PASSWORD: kommodity
      POSTGRES_DB: kommodity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kommodity-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kommodity -d kommodity"]
      interval: 5s
      timeout: 3s
      retries: 5

  kommodity:
    image: kommodity:latest
    restart: always
    profiles:
      - kommodity
    environment:
      KOMMODITY_DB_URI: postgres://kommodity:kommodity@postgres:5432/kommodity?sslmode=disable
      KOMMODITY_INFRASTRUCTURE_PROVIDERS: scaleway,kubevirt
      KOMMODITY_KINE_URI: unix:///tmp/kine.sock
      KOMMODITY_BASE_URL: https://localhost:5443
      KOMMODITY_INSECURE_DISABLE_AUTHENTICATION: "true"
      KOMMODITY_DEVELOPMENT_MODE: "true"
      LOG_LEVEL: "info"
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - kommodity-net

  pgadmin:
    image: dpage/pgadmin4:8
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: kommodity@corti.ai
      PGADMIN_DEFAULT_PASSWORD: kommodity
      PGADMIN_CONFIG_SERVER_MODE: "False" # Load preconfigured servers
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - kommodity-net

  caddy:
    image: caddy:2
    restart: always
    profiles:
      - kommodity
    ports:
      - "5443:5443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - kommodity-net
    depends_on:
      - kommodity

volumes:
  pgdata:

networks:
  kommodity-net:
    driver: bridge
