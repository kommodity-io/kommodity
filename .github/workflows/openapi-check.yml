name: OpenAPI Spec Check

on:
  pull_request:
    paths:
      - "pkg/metadata/**/*"
      - "pkg/attestation/**/*"
      - ".github/workflows/openapi-check.yml"
      - "go.mod"
      - "go.sum"
  push:
    branches:
      - main
    paths:
      - openapi/**/*

jobs:
  check-openapi-spec-consistency:
    name: Check OpenAPI Spec Consistency
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"

      - name: Run make generate
        run: make generate

      - name: Check for changes in openapi folder
        id: diff
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          openapi_changed=false
          if ! git diff --exit-code origin/$BRANCH_NAME -- "openapi/**/*"; then
            openapi_changed=true
          fi

          if [ "$openapi_changed" = "true" ]; then
            echo "diff_found=true" >> $GITHUB_OUTPUT
          else
            echo "diff_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if openapi spec has changed
        if: ${{ steps.diff.outputs.diff_found == 'true' }}
        run: |
          echo "Error: One or more files in openapi/**/* have changed after running 'make generate'. Please commit the updated files."
          exit 1

  openapi-spec-release:
    name: Release OpenAPI Spec
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Setup ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Package and upload openapi YAMLs
        run: |
          set -eou pipefail

          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username ${{ github.actor }} --password-stdin

          for dir in openapi/*/; do
            folder=$(basename "$dir")
            yaml_file="${dir}swagger.yaml"
            if [ -f "$yaml_file" ]; then
              oras push ghcr.io/kommodity-io/openapi/${folder}:latest \
                --artifact-type application/openapi+yaml \
                --annotation "org.opencontainers.image.source=https://github.com/kommodity-io/kommodity" \
                ./$yaml_file:application/openapi+yaml
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
