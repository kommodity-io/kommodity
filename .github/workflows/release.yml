name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "images/*.png"
      - charts/**/*.yaml
      - charts/**/*.tpl
      - scripts/**/*.sh
      - .github/workflows/**/*.yml
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "images/*.png"
      - "**/*.tf"
      - charts/**/*.yaml
      - charts/**/*.tpl
      - scripts/**/*.sh

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-changes:
    name: Check Changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get changed files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: changed
        with:
          files: .github/workflows/**
          files_ignore: .github/workflows/release.yml

      - name: Check if workflow should run
        id: check
        run: |
          # If only other workflow files changed (not release.yml), skip
          if [[ "${{ steps.changed.outputs.only_changed }}" == "true" ]]; then
            echo "Only non-release workflow files changed, skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  # Compute version for the release
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
          check-latest: true

      - name: Detect semantic release
        uses: docker://ghcr.io/codfish/semantic-release-action@sha256:5d5447090feb2f9252aac2825ef14e244ecf53528fbe87d585b459adb547b914 # v4
        id: semantic
        with:
          repository-url: https://github.com/${{ github.repository }}
          branches: |
            [
              "main"
            ]
          plugins: |
            [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              "@semantic-release/github"
            ]
          dry-run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        run: |
          set -eou pipefail
          version="${{ steps.semantic.outputs.git-tag }}"
          if [[ -z "$version" ]]; then
            version="$(git describe --tags --always)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: prepare
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build container image for testing
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6
        with:
          context: .
          file: Containerfile
          push: false
          load: true
          tags: kommodity:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}

      - name: Calculate test coverage
        uses: gwatts/go-coverage-action@2845595538a59d63d1bf55f109c14e104c6f7cb3 # v2
        id: coverage
        with:
          coverage-threshold: 0
          cover-pkg: ./...

      - name: Run Kubevirt integration tests
        run: |
          export CLUSTER_NAME="ci-cluster-${GITHUB_SHA::5}"
          make run-kubevirt-integration-test

      - name: Upload kommodity test logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kommodity-test-logs
          path: pkg/test/kommodity_container.log

  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: prepare
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      pages: write
      contents: write
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Compute compression flags
        id: compression
        run: |
          set -eou pipefail
          compression="--ultra-brute -9"

          # Check if this is a tagged release
          if [[ "${{ needs.prepare.outputs.version }}" != v* ]]; then
            compression="-qq"
          fi

          # Avoid compression for darwin as it is not supported on MacOS 13+.
          if [[ "${{ matrix.os }}" == "darwin" ]]; then
            compression=""
          fi

          # Avoid compression for windows/arm64 as it is not supported.
          if [[ "${{ matrix.os }}" == "windows" && "${{ matrix.arch }}" == "arm64" ]]; then
            compression=""
          fi

          echo "flags=$compression" >> "$GITHUB_OUTPUT"

      - name: Build
        run: make build
        env:
          GOOS: "${{ matrix.os }}"
          GOARCH: "${{ matrix.arch }}"
          VERSION: "${{ needs.prepare.outputs.version }}"
          UPX_FLAGS: "${{ steps.compression.outputs.flags }}"

      - name: Rename binary
        run: |
          set -eou pipefail
          target="kommodity-${{ matrix.os }}-${{ matrix.arch }}-${{ needs.prepare.outputs.version }}"
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            target="${target}.exe"
          fi
          mv bin/kommodity bin/${target}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kommodity-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/kommodity-*
          retention-days: 1

  build-image:
    name: Build container image
    runs-on: ubuntu-latest
    needs: prepare
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Free disk space
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo rm -rf /usr/local/lib/android >/dev/null 2>&1
          docker system prune -af

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build container image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6
        with:
          context: .
          file: Containerfile
          push: false
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          outputs: type=oci,dest=/tmp/image.tar

      - name: Upload container image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-image
          path: /tmp/image.tar
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - prepare
      - build
      - build-image
    permissions:
      contents: write
      pull-requests: write
      issues: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release
          pattern: kommodity-*-*
          merge-multiple: true

      - name: Download container image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: container-image
          path: /tmp

      # Step 1: Dry-run to compute the next version
      - name: Detect next version
        id: semantic
        uses: docker://ghcr.io/codfish/semantic-release-action@sha256:5d5447090feb2f9252aac2825ef14e244ecf53528fbe87d585b459adb547b914 # v4
        with:
          dry-run: true
          repository-url: https://github.com/${{ github.repository }}
          branches: |
            [
              "main"
            ]
          plugins: |
            [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              "@semantic-release/github"
            ]
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release is needed
        id: check
        run: |
          version="${{ steps.semantic.outputs.release-version }}"
          if [[ -z "$version" ]]; then
            echo "No new release needed"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New release version: v$version"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=v$version" >> "$GITHUB_OUTPUT"
          fi

      # Push pre-built Docker image (only if new release)
      - name: Setup ORAS
        if: steps.check.outputs.should_release == 'true'
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.should_release == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push container image
        if: steps.check.outputs.should_release == 'true'
        run: |
          mkdir -p /tmp/image
          tar -xf /tmp/image.tar -C /tmp/image
          digest=$(jq -r '.manifests[0].digest' /tmp/image/index.json)
          oras copy --from-oci-layout "/tmp/image@${digest}" \
            ghcr.io/${{ github.repository }}:${{ steps.check.outputs.version }}
          oras copy --from-oci-layout "/tmp/image@${digest}" \
            ghcr.io/${{ github.repository }}:latest
          oras copy --from-oci-layout "/tmp/image@${digest}" \
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      # Create GitHub release (only after Docker push succeeds)
      - name: Create GitHub release
        if: steps.check.outputs.should_release == 'true'
        uses: docker://ghcr.io/codfish/semantic-release-action@sha256:5d5447090feb2f9252aac2825ef14e244ecf53528fbe87d585b459adb547b914 # v4
        with:
          repository-url: https://github.com/${{ github.repository }}
          branches: |
            [
              "main"
            ]
          plugins: |
            [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              ["@semantic-release/github", { "assets": [{ "path": "release/**" }] }]
            ]
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
