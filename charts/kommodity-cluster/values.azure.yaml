---
# Example of values to create a cluster in Azure.
kommodity:
  provider:
    name: Azure
    secret:
      # Azure credentials secret for Cloud Controller Manager.
      # This secret must exist in the Kommodity management cluster BEFORE deploying the chart.
      # The CCM CRS reconciler reads this secret and delivers it into the workload cluster's
      # kube-system namespace as "azure-cloud-provider" via a ClusterResourceSet payload Secret.
      #
      # Create the secret in the management cluster:
      #
      # apiVersion: v1
      # kind: Secret
      # metadata:
      #   name: azure-cloud-provider
      #   namespace: <release-namespace>
      # stringData:
      #   cloud-config: |
      #     {
      #       "tenantId": "<YOUR_TENANT_ID>",
      #       "subscriptionId": "<YOUR_SUBSCRIPTION_ID>",
      #       "resourceGroup": "<YOUR_WORKLOAD_RESOURCE_GROUP>",
      #       "location": "westeurope",
      #       "useManagedIdentityExtension": false,
      #       "aadClientId": "<YOUR_CLIENT_ID>",
      #       "aadClientSecret": "<YOUR_CLIENT_SECRET>",
      #       "loadBalancerSku": "standard",
      #       "vmType": "standard",
      #       "useInstanceMetadata": true,
      #       "securityGroupName": "<CLUSTER>-node-nsg",
      #       "securityGroupResourceGroup": "<NSG_RESOURCE_GROUP>",
      #       "vnetName": "<YOUR_VNET_NAME>",
      #       "vnetResourceGroup": "<VNET_RESOURCE_GROUP>",
      #       "subnetName": "<CLUSTER>-node-subnet",
      #       "routeTableName": "<CLUSTER>-node-routetable",
      #       "cloudProviderBackoff": true,
      #       "cloudProviderBackoffRetries": 6,
      #       "cloudProviderRateLimit": true,
      #       "cloudProviderRateLimitQPS": 3.0,
      #       "cloudProviderRateLimitBucket": 10
      #     }
      name: azure-cloud-provider
    identity:
      # AzureClusterIdentity resource name for authentication.
      # Create this resource in the management cluster before deploying:
      #
      # apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      # kind: AzureClusterIdentity
      # metadata:
      #   name: azure-cluster-identity
      #   namespace: default
      # spec:
      #   type: ServicePrincipal
      #   tenantID: <YOUR_TENANT_ID>
      #   clientID: <YOUR_CLIENT_ID>
      #   clientSecret:
      #     name: azure-cluster-identity-secret
      #     namespace: default
      #   allowedNamespaces: {}
      name: azure-cluster-identity
    config:
      subscriptionID: <YOUR_SUBSCRIPTION_ID>
      resourceGroup: <YOUR_RESOURCE_GROUP>
      location: westeurope

    cloudControllerManager:
      enabled: true
      # Every image and resource block below is overridable (e.g. to pull from a
      # private registry mirror or tune requests/limits). Each defaults to the value shown.
      #
      # cloud-controller-manager Deployment image + resources:
      # v1.34.3 is the latest published azure-cloud-controller-manager — no v1.35.x
      # release exists yet. Azure supports running the CCM one minor behind the
      # cluster's Kubernetes version (here v1.35.3), so this is the correct
      # best-available pin, not stale. Bump to v1.35.x once Azure ships it.
      image:
        repository: mcr.microsoft.com/oss/kubernetes/azure-cloud-controller-manager
        tag: v1.34.3
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 4
          memory: 2Gi
      # initContainer image that waits for the cloud-config Secret before CCM starts.
      # Tracks the cluster's Kubernetes version (talos.version / values.yaml).
      initImage:
        repository: registry.k8s.io/kubectl
        tag: v1.35.3
      # cloud-node-manager DaemonSet (Linux + Windows) image + resources:
      # v1.34.3 is the latest published azure-cloud-node-manager (no v1.35.x yet);
      # same N-1 rationale as the controller-manager image above.
      nodeManager:
        image:
          repository: mcr.microsoft.com/oss/kubernetes/azure-cloud-node-manager
          tag: v1.34.3
        resources:
          requests:
            cpu: 50m
            memory: 50Mi
          limits:
            cpu: 2
            memory: 512Mi

  global:
    strategicPatches:
      # NOTE: kubelet --cloud-provider=external is no longer set here — the chart
      # auto-injects it whenever kommodity.provider.cloudControllerManager.enabled
      # is true (see _helpers.tpl "mergedStrategicPatch"). Omitting it previously
      # left nodes without a providerID, which broke CAPI NodeRef linking and
      # wedged control-plane rollouts, so it must never be optional.
      #
      # Enable anonymous authentication on kube-apiserver.
      # CAPZ hardcodes an HTTPS GET /readyz probe on the apiserver LB (not configurable via the
      # AzureCluster spec). Talos defaults --anonymous-auth=false, so /readyz returns HTTP 401 to
      # the anonymous probe, causing the Azure LB to mark all backends unhealthy and silently drop
      # apiserver traffic. Kubernetes' built-in system:public-info-viewer ClusterRoleBinding grants
      # system:unauthenticated read access to /livez, /readyz, /healthz, and /version only —
      # no resource data is exposed.
      cluster:
        apiServer:
          extraArgs:
            anonymous-auth: "true"

  network:
    ipv4:
      enabled: true
      # The `public` flag controls the apiServerLB type ONLY. Node VMs never
      # receive public IPs in either mode — matching the Scaleway model, the
      # general network stays private and only the Kubernetes API (6443) is
      # exposed via a cloud load balancer. The Talos API (50000) is never put on
      # the LB; Kommodity reaches it over the private network through the
      # talos-cluster-proxy tunnel (port-forwarded through the K8s API LB to the
      # in-cluster proxy pod, which dials the node's private IP:50000).
      #
      # public: false → fully-private cluster (default)
      #   The chart emits apiServerLB.type: Internal so CAPZ creates an internal
      #   load balancer (no PublicIP attached). Node VMs reach the internet for
      #   egress-only via a NAT gateway on the node subnet; no inbound path exists
      #   except through a VPN, VNet peering, or Azure Bastion.
      #   The management cluster must be reachable from inside the VNet (peered,
      #   VPN-connected, or running in Azure itself) for CAPZ controllers to work.
      #
      # public: true → public Kubernetes API
      #   The chart emits apiServerLB.type: Public. CAPZ creates a PublicIP for
      #   the apiserver load balancer so the K8s API (6443) is internet-reachable.
      #   Node VMs remain private; the management cluster reaches the Talos API
      #   via the talos-cluster-proxy tunnel through the public K8s API LB.
      public: false
      # nodeCIDR is ALWAYS required on Azure: node VMs are private in both modes,
      # so the talos-cluster-proxy needs this range to identify which node IPs to
      # route through the tunnel. It must cover the control-plane (10.0.0.0/16)
      # and node (10.1.0.0/16) subnets the chart creates, hence the VNet supernet.
      # Azure VNets support CIDR ranges between /8 and /29.
      nodeCIDR: 10.0.0.0/8
      # vnet:
      #   # Optional: Use an existing VNet instead of creating a new one.
      #   # When omitted, the chart creates <cluster>-vnet with 10.0.0.0/8.
      #   # When set, all three NSG and RouteTable ASO CRs are emitted via networkresources.yaml
      #   # (CAPZ skips creating them in BYO-VNet mode, so they must pre-exist).
      #   name: my-existing-vnet
      #   resourceGroup: my-vnet-resource-group
      # subnet:
      #   # Optional: Override the single-subnet path (for BYO-subnet scenarios).
      #   # When omitted, the chart creates a controlplane and a node subnet.
      #   name: my-subnet
      #   cidrBlock: 10.200.0.0/24

  controlplane:
    replicas: 1
    # Azure VM size - see https://docs.microsoft.com/en-us/azure/virtual-machines/sizes
    sku: Standard_D2s_v3
    os:
      disk:
        size: 30
        # Azure disk types: Standard_LRS, Premium_LRS, StandardSSD_LRS, UltraSSD_LRS
        type: Premium_LRS
    healthCheck:
      enabled: true
      unhealthyConditions:
        - type: Ready
          status: Unknown
          timeout: 300s
        - type: Ready
          status: "False"
          timeout: 300s

  nodepools:
    default:
      replicas: 1
      # Azure VM size - see https://docs.microsoft.com/en-us/azure/virtual-machines/sizes
      # For GPU workloads, use NC-series (e.g., Standard_NC6s_v3)
      sku: Standard_D2s_v3
      # Azure availability zone (string: "1", "2", or "3")
      zone: "1"
      os:
        disk:
          size: 30
          # Azure disk types: Standard_LRS, Premium_LRS, StandardSSD_LRS, UltraSSD_LRS
          type: Premium_LRS
      # dataDisks:
      #   # Optional: Additional data disks for the node
      #   - nameSuffix: data
      #     diskSizeGB: 100
      #     lun: 0
      #     storageAccountType: Premium_LRS
      #     cachingType: ReadWrite
      labels:
        my-label: my-value
      annotations:
        my-annotation: my-annotation-value
      healthCheck:
        enabled: true
        unhealthyConditions:
          - type: Ready
            status: Unknown
            timeout: 300s
          - type: Ready
            status: "False"
            timeout: 300s

talos:
  # Follow this documentation to generate a Talos image for Azure:
  # https://docs.siderolabs.com/talos/v1.13/platform-specific-installations/cloud-platforms/azure
  #
  # Use one of:
  #   id: <MANAGED_IMAGE_ARM_ID>           # managed image (e.g. /subscriptions/.../images/talos-v1.13.0)
  #   computeGallery:                       # shared image gallery
  #     gallery: myGallery
  #     name: talos-v1.13.0
  #     version: 1.0.0
  #   marketplace:                          # Azure Marketplace image (requires accepting terms)
  #     publisher: siderolabs
  #     offer: talos
  #     sku: talos
  #     version: 1.13.0
  id: /subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RESOURCE_GROUP>/providers/Microsoft.Compute/images/kommodity-talos-azure-v1.13.0
