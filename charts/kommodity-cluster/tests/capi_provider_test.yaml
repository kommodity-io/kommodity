suite: test creation of resources for CAPI
values:
  - ../values.scaleway.yaml
release:
  name: test-cluster
  namespace: default
templates:
  - templates/*
tests:
  # Cluster
  - it: should make sure Cluster references the correct TalosControlPlane
    template: templates/provider/capi/cluster.yaml
    asserts:
      - isKind:
          of: Cluster
      - hasDocuments:
          count: 1
      - equal:
          path: spec.controlPlaneRef.kind
          value: "TalosControlPlane"
      - equal:
          path: spec.controlPlaneRef.name
          value: "test-cluster-controlplane"

  # MachineDeployment tests
  - it: should make sure MachineDeployment references the correct TalosConfigTemplate
    template: templates/provider/capi/machinedeployment.yaml
    asserts:
      - isKind:
          of: MachineDeployment
      - hasDocuments:
          count: 1
      - equal:
          path: spec.template.spec.bootstrap.configRef.kind
          value: "TalosConfigTemplate"
      - matchRegex:
          path: spec.template.spec.bootstrap.configRef.name
          pattern: ^test-cluster-worker-default-[a-f0-9]{6}$

  # Talos proxy CIDR annotation tests
  - it: should add node-cidr annotation when private network with nodeCIDR
    template: templates/provider/capi/cluster.yaml
    set:
      kommodity.network.ipv4.enabled: true
      kommodity.network.ipv4.public: false
      kommodity.network.ipv4.nodeCIDR: "10.200.0.0/20"
    asserts:
      - equal:
          path: metadata.annotations["kommodity.io/node-cidr"]
          value: "10.200.0.0/20"

  - it: should not add node-cidr annotation when public network
    template: templates/provider/capi/cluster.yaml
    set:
      kommodity.network.ipv4.enabled: true
      kommodity.network.ipv4.public: true
    asserts:
      - notExists:
          path: metadata.annotations["kommodity.io/node-cidr"]

  - it: should not add node-cidr annotation when ipv4 disabled
    template: templates/provider/capi/cluster.yaml
    set:
      kommodity.network.ipv4.enabled: false
    asserts:
      - notExists:
          path: metadata.annotations["kommodity.io/node-cidr"]

  # nodeCIDR required when talos-cluster-proxy enabled on private IPv4
  # Use Kubevirt provider to bypass Scaleway template's own nodeCIDR requirement.
  - it: should fail when talos-cluster-proxy enabled on private network without nodeCIDR
    template: templates/provider/capi/cluster.yaml
    values:
      - ../values.kubevirt.yaml
    set:
      kommodity.network.ipv4.enabled: true
      kommodity.network.ipv4.public: false
      kommodity.network.ipv4.nodeCIDR: null
      kommodity.addons:
        talos-cluster-proxy:
          enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "kommodity.network.ipv4.nodeCIDR must be set when the talos-cluster-proxy addon is enabled and node VMs are private (always on Azure; private IPv4 networks elsewhere). The proxy uses it to identify valid Talos node targets."

  - it: should succeed when talos-cluster-proxy enabled on private network with nodeCIDR set
    template: templates/provider/capi/cluster.yaml
    values:
      - ../values.kubevirt.yaml
    set:
      kommodity.network.ipv4.enabled: true
      kommodity.network.ipv4.public: false
      kommodity.network.ipv4.nodeCIDR: "10.200.0.0/20"
      kommodity.addons:
        talos-cluster-proxy:
          enabled: true
    asserts:
      - isKind:
          of: Cluster
      - equal:
          path: metadata.annotations["kommodity.io/node-cidr"]
          value: "10.200.0.0/20"

  - it: should not fail when talos-cluster-proxy enabled on public network without nodeCIDR
    template: templates/provider/capi/cluster.yaml
    values:
      - ../values.kubevirt.yaml
    set:
      kommodity.network.ipv4.enabled: true
      kommodity.network.ipv4.public: true
      kommodity.network.ipv4.nodeCIDR: null
      kommodity.addons:
        talos-cluster-proxy:
          enabled: true
    asserts:
      - isKind:
          of: Cluster

  - it: should not fail when talos-cluster-proxy disabled without nodeCIDR
    template: templates/provider/capi/cluster.yaml
    values:
      - ../values.kubevirt.yaml
    set:
      kommodity.network.ipv4.enabled: true
      kommodity.network.ipv4.public: false
      kommodity.network.ipv4.nodeCIDR: null
      kommodity.addons:
        talos-cluster-proxy:
          enabled: false
    asserts:
      - isKind:
          of: Cluster

  # Azure: node VMs are always private (the `public` flag controls the
  # apiServerLB type only), so node-cidr is required and emitted even when
  # public: true — the Talos API is reached via the talos-cluster-proxy tunnel.
  - it: should add node-cidr annotation for Azure public cluster with nodeCIDR
    template: templates/provider/capi/cluster.yaml
    values:
      - ../values.azure.yaml
    set:
      kommodity.network.ipv4.enabled: true
      kommodity.network.ipv4.public: true
      kommodity.network.ipv4.nodeCIDR: "10.0.0.0/8"
    asserts:
      - equal:
          path: metadata.annotations["kommodity.io/node-cidr"]
          value: "10.0.0.0/8"

  - it: should fail for Azure public cluster when talos-cluster-proxy enabled without nodeCIDR
    template: templates/provider/capi/cluster.yaml
    values:
      - ../values.azure.yaml
    set:
      kommodity.network.ipv4.enabled: true
      kommodity.network.ipv4.public: true
      kommodity.network.ipv4.nodeCIDR: null
      kommodity.addons:
        talos-cluster-proxy:
          enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "kommodity.network.ipv4.nodeCIDR must be set when the talos-cluster-proxy addon is enabled and node VMs are private (always on Azure; private IPv4 networks elsewhere). The proxy uses it to identify valid Talos node targets."

  # Autoscaling annotation tests
  - it: should set autoscaler annotations when both minReplicas and maxReplicas are set
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.replicas: null
      kommodity.nodepools.default.autoscaling.minReplicas: 0
      kommodity.nodepools.default.autoscaling.maxReplicas: 5
    asserts:
      - isKind:
          of: MachineDeployment
      - equal:
          path: metadata.annotations["cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size"]
          value: "0"
      - equal:
          path: metadata.annotations["cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size"]
          value: "5"
      - notExists:
          path: spec.replicas

  - it: should propagate nodepool annotations to MachineDeployment metadata
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.annotations:
        my-annotation: my-annotation-value
        another: another-value
    asserts:
      - isKind:
          of: MachineDeployment
      - equal:
          path: metadata.annotations["my-annotation"]
          value: "my-annotation-value"
      - equal:
          path: metadata.annotations["another"]
          value: "another-value"

  - it: should merge nodepool annotations with autoscaler annotations
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.replicas: null
      kommodity.nodepools.default.autoscaling.minReplicas: 1
      kommodity.nodepools.default.autoscaling.maxReplicas: 3
      kommodity.nodepools.default.annotations:
        my-annotation: my-annotation-value
    asserts:
      - isKind:
          of: MachineDeployment
      - equal:
          path: metadata.annotations["my-annotation"]
          value: "my-annotation-value"
      - equal:
          path: metadata.annotations["cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size"]
          value: "1"
      - equal:
          path: metadata.annotations["cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size"]
          value: "3"

  - it: should fail when only minReplicas is set without maxReplicas
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.replicas: null
      kommodity.nodepools.default.autoscaling.minReplicas: 1
    asserts:
      - failedTemplate:
          errorMessage: "nodepool default: both autoscaling.minReplicas and autoscaling.maxReplicas must be set together"

  - it: should fail when only maxReplicas is set without minReplicas
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.replicas: null
      kommodity.nodepools.default.autoscaling.maxReplicas: 5
    asserts:
      - failedTemplate:
          errorMessage: "nodepool default: both autoscaling.minReplicas and autoscaling.maxReplicas must be set together"

  - it: should set replicas to 0 when explicitly configured
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.replicas: 0
    asserts:
      - isKind:
          of: MachineDeployment
      - equal:
          path: spec.replicas
          value: 0

  - it: should fail when replicas is set together with autoscaling
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.replicas: 3
      kommodity.nodepools.default.autoscaling.minReplicas: 1
      kommodity.nodepools.default.autoscaling.maxReplicas: 5
    asserts:
      - failedTemplate:
          errorMessage: "nodepool default: replicas cannot be set together with autoscaling.minReplicas or autoscaling.maxReplicas"

  - it: should fail when multi-zone autoscaling can scale a zone from zero without a capacity annotation
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.replicas: null
      kommodity.nodepools.default.zones:
        - fr-par-1
        - fr-par-2
      kommodity.nodepools.default.autoscaling.minReplicas: 1
      kommodity.nodepools.default.autoscaling.maxReplicas: 5
    asserts:
      - failedTemplate:
          errorMessage: "nodepool default: autoscaling with minReplicas 1 across 2 zones leaves a zone with a minimum of 0; add at least one 'capacity.cluster-autoscaler.kubernetes.io/*' annotation (e.g. .../cpu, .../memory) so the autoscaler can scale that zone from zero"

  - it: should allow multi-zone scale-from-zero autoscaling with a capacity annotation
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.replicas: null
      kommodity.nodepools.default.zones:
        - fr-par-1
        - fr-par-2
      kommodity.nodepools.default.autoscaling.minReplicas: 1
      kommodity.nodepools.default.autoscaling.maxReplicas: 5
      kommodity.nodepools.default.annotations:
        capacity.cluster-autoscaler.kubernetes.io/cpu: "2"
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.annotations["capacity.cluster-autoscaler.kubernetes.io/cpu"]
          value: "2"
        documentIndex: 0
      # minReplicas 1 over 2 zones -> 1 and 0; the zero zone is what needs the capacity hint.
      - equal:
          path: metadata.annotations["cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size"]
          value: "1"
        documentIndex: 0
      - equal:
          path: metadata.annotations["cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size"]
          value: "0"
        documentIndex: 1

  # Test Kubernetes version precedence
  - it: should make sure Kubernetes version defined in nodepool's config take precedence
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kubernetes.version: "global-kubernetes-version"
      kommodity.nodepools.default.kubernetes.version: "nodepool-kubernetes-version"
    asserts:
      - isKind:
          of: MachineDeployment
      - hasDocuments:
          count: 1
      - equal:
          path: spec.template.spec.version
          value: "nodepool-kubernetes-version"
