suite: test creation of resources for extra secrets via ClusterResourceSet
release:
  name: test-cluster
  namespace: default
templates:
  - templates/extra-secrets.yaml
tests:
  - it: should not render any extra secrets resource when extraSecrets is empty
    template: templates/extra-secrets.yaml
    set:
      kommodity.extraSecrets: null
    asserts:
      - hasDocuments:
          count: 0

  - it: should render payload Secret and ClusterResourceSet
    template: templates/extra-secrets.yaml
    set:
      kommodity.extraSecrets:
        default:
          my-string-data-secret:
            type: Opaque
            stringData:
              my-key: my-value
            labels:
              my-label: my-label-value
    asserts:
      - hasDocuments:
          count: 2
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: test-cluster-kommodity-extra-secrets
          namespace: default
        documentIndex: 0
      - containsDocument:
          kind: ClusterResourceSet
          apiVersion: addons.cluster.x-k8s.io/v1beta1
          name: test-cluster-extra-secrets
          namespace: default
        documentIndex: 1

  - it: should set payload Secret type to ClusterResourceSetSecretType
    template: templates/extra-secrets.yaml
    set:
      kommodity.extraSecrets:
        default:
          my-secret:
            stringData:
              key: value
    documentSelector:
      path: kind
      value: Secret
    asserts:
      - equal:
          path: type
          value: addons.cluster.x-k8s.io/resource-set

  - it: should not carry the watch-filter label on the payload Secret
    template: templates/extra-secrets.yaml
    set:
      kommodity.extraSecrets:
        default:
          my-secret:
            stringData:
              key: value
    documentSelector:
      path: kind
      value: Secret
    asserts:
      - notExists:
          path: metadata.labels["cluster.x-k8s.io/watch-filter"]

  - it: should label the payload Secret with cluster name and managed-by
    template: templates/extra-secrets.yaml
    set:
      kommodity.extraSecrets:
        default:
          my-secret:
            stringData:
              key: value
    documentSelector:
      path: kind
      value: Secret
    asserts:
      - equal:
          path: metadata.labels["cluster.x-k8s.io/cluster-name"]
          value: test-cluster
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: kommodity

  - it: should set CRS strategy to Reconcile and select by cluster-name label
    template: templates/extra-secrets.yaml
    set:
      kommodity.extraSecrets:
        default:
          my-secret:
            stringData:
              key: value
    documentSelector:
      path: kind
      value: ClusterResourceSet
    asserts:
      - equal:
          path: spec.strategy
          value: Reconcile
      - equal:
          path: spec.clusterSelector.matchLabels["cluster.x-k8s.io/cluster-name"]
          value: test-cluster

  - it: should reference the payload Secret as CRS resource
    template: templates/extra-secrets.yaml
    set:
      kommodity.extraSecrets:
        default:
          my-secret:
            stringData:
              key: value
    documentSelector:
      path: kind
      value: ClusterResourceSet
    asserts:
      - contains:
          path: spec.resources
          content:
            kind: Secret
            name: test-cluster-kommodity-extra-secrets

  - it: should embed downstream secret manifest in stringData
    template: templates/extra-secrets.yaml
    set:
      kommodity.extraSecrets:
        default:
          my-string-data-secret:
            type: Opaque
            stringData:
              my-key: my-value
            labels:
              my-label: my-label-value
    documentSelector:
      path: kind
      value: Secret
    asserts:
      - matchRegex:
          path: stringData["default-my-string-data-secret"]
          pattern: "kind: Secret"

  - it: should fail when a secret defines both data and stringData
    template: templates/extra-secrets.yaml
    set:
      kommodity.extraSecrets:
        default:
          bad-secret:
            data:
              key1: dmFsdWUx
            stringData:
              key2: value2
    asserts:
      - failedTemplate:
          errorMessage: "Secret 'bad-secret' in namespace 'default' cannot have both 'data' and 'stringData' defined"
