suite: test creation of resources for Talos
values:
  - ../values.scaleway.yaml
release:
  name: test-cluster
  namespace: default
templates:
  - templates/*
tests:
  # TalosControlPlane tests
  - it: should make sure a TalosControlPlane is created
    template: templates/talos/controlplane.yaml
    asserts:
      - isKind:
          of: TalosControlPlane
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: "test-cluster-controlplane"
      - equal:
          path: spec.infrastructureTemplate.kind
          value: ScalewayMachineTemplate

  # TalosConfigTemplate tests
  - it: should make sure a TalosConfigTemplate is created
    template: templates/talos/configtemplate.yaml
    asserts:
      - isKind:
          of: TalosConfigTemplate
      - hasDocuments:
          count: 1
      - matchRegex:
          path: metadata.name
          pattern: ^test-cluster-worker-default-[a-f0-9]{6}$

  # Hash change tests
  - it: should update the TalosConfigTemplate name when kms config is changed
    template: templates/talos/configtemplate.yaml
    set:
      kommodity.kms.enabled: true
    asserts:
      - isKind:
          of: TalosConfigTemplate
      - hasDocuments:
          count: 1
      - matchRegex:
          path: metadata.name
          pattern: ^test-cluster-worker-default-[a-f0-9]{6}$

  - it: should update the TalosConfigTemplate name when global strategic patches are changed
    template: templates/talos/configtemplate.yaml
    set:
      kommodity.global.strategicPatches:
        - machine:
            env:
              CHANGED_VAR: changed-value
    asserts:
      - isKind:
          of: TalosConfigTemplate
      - hasDocuments:
          count: 1
      - matchRegex:
          path: metadata.name
          pattern: ^test-cluster-worker-default-[a-f0-9]{6}$

  - it: should update the TalosConfigTemplate name when nodepool strategic patches are changed
    template: templates/talos/configtemplate.yaml
    set:
      kommodity.nodepools.default.strategicPatches:
        - machine:
            env:
              NODEPOOL_VAR: nodepool-value
    asserts:
      - isKind:
          of: TalosConfigTemplate
      - hasDocuments:
          count: 1
      - matchRegex:
          path: metadata.name
          pattern: ^test-cluster-worker-default-[a-f0-9]{6}$

  - it: should update the TalosConfigTemplate name when Talos version is changed
    template: templates/talos/configtemplate.yaml
    set:
      talos.version: "new-version"
    asserts:
      - isKind:
          of: TalosConfigTemplate
      - hasDocuments:
          count: 1
      - matchRegex:
          path: metadata.name
          pattern: ^test-cluster-worker-default-[a-f0-9]{6}$

  # Strategic patch merging tests
  - it: should merge global and nodepool strategic patches
    template: templates/talos/configtemplate.yaml
    set:
      kommodity.global.strategicPatches:
        - machine:
            env:
              GLOBAL_VAR: global-value
      kommodity.nodepools.default.strategicPatches:
        - machine:
            env:
              NODEPOOL_VAR: nodepool-value
    asserts:
      - isKind:
          of: TalosConfigTemplate
      - hasDocuments:
          count: 1
      - matchRegex:
          path: spec.template.spec.strategicPatches[0]
          pattern: "GLOBAL_VAR: global-value"
      - matchRegex:
          path: spec.template.spec.strategicPatches[0]
          pattern: "NODEPOOL_VAR: nodepool-value"
      - matchRegex:
          path: spec.template.spec.strategicPatches[0]
          pattern: "LOG_LEVEL: warn"

  - it: should let nodepool patches override global patches for same key
    template: templates/talos/configtemplate.yaml
    set:
      kommodity.global.strategicPatches:
        - machine:
            env:
              SHARED_VAR: global-value
      kommodity.nodepools.default.strategicPatches:
        - machine:
            env:
              SHARED_VAR: nodepool-value
    asserts:
      - isKind:
          of: TalosConfigTemplate
      - hasDocuments:
          count: 1
      - matchRegex:
          path: spec.template.spec.strategicPatches[0]
          pattern: "SHARED_VAR: nodepool-value"
      - notMatchRegex:
          path: spec.template.spec.strategicPatches[0]
          pattern: "SHARED_VAR: global-value"

  # Taints tests
  - it: should generate kubelet extraArgs and nodeTaints in strategic patch for taints
    template: templates/talos/configtemplate.yaml
    set:
      kommodity.global.strategicPatches: []
      kommodity.nodepools.default.taints:
        workload: "gpu:NoSchedule"
    asserts:
      - isKind:
          of: TalosConfigTemplate
      - hasDocuments:
          count: 1
      - matchRegex:
          path: metadata.name
          pattern: ^test-cluster-worker-default-[a-f0-9]{6}$
      - matchRegex:
          path: spec.template.spec.strategicPatches[0]
          pattern: "register-with-taints: workload=gpu:NoSchedule"
      - matchRegex:
          path: spec.template.spec.strategicPatches[0]
          pattern: "workload: gpu:NoSchedule"

  # Labels and annotations tests
  - it: should generate nodeLabels and nodeAnnotations in strategic patch
    template: templates/talos/configtemplate.yaml
    set:
      kommodity.global.strategicPatches: []
    asserts:
      - isKind:
          of: TalosConfigTemplate
      - hasDocuments:
          count: 1
      - matchRegex:
          path: spec.template.spec.strategicPatches[0]
          pattern: "my-label: my-value"
      - matchRegex:
          path: spec.template.spec.strategicPatches[0]
          pattern: "my-annotation: my-annotation-value"

  # Test Talos version and image precedence
  - it: should make sure Talos version defined in nodepool's config takes precedence
    template: templates/talos/configtemplate.yaml
    set:
      talos.version: "global-talos-version"
      kommodity.nodepools.default.talos.version: "nodepool-talos-version"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.template.spec.talosVersion
          value: "nodepool-talos-version"

  - it: should make sure Talos version defined in controlplane's config takes precedence
    template: templates/talos/controlplane.yaml
    set:
      talos.version: "global-talos-version"
      kommodity.controlplane.talos.version: "controlplane-talos-version"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.controlPlaneConfig.controlplane.talosVersion
          value: "controlplane-talos-version"

  - it: should make sure Talos image defined in nodepool's and controlplane's config takes precedence
    template: templates/provider/scaleway/machinetemplate.yaml
    set:
      talos.image: "global-talos-image"
      kommodity.controlplane.talos.imageName: "controlplane-talos-image"
      kommodity.nodepools.default.talos.imageName: "nodepool-talos-image"
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: spec.template.spec.image.name
          value: "controlplane-talos-image"
        documentIndex: 0
      - equal:
          path: spec.template.spec.image.name
          value: "nodepool-talos-image"
        documentIndex: 1

  # AutoBootstrap extension tests
  - it: should include autoBootstrap extension when kommodity.network.ipv4.public is false, even though the autoBootstrap.enabled value is false
    template: templates/talos/controlplane.yaml
    set:
      kommodity.network.ipv4.public: false
      talos.autoBootstrap.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - exists:
          path: spec.controlPlaneConfig.controlplane.strategicPatches
      - matchRegex:
          path: spec.controlPlaneConfig.controlplane.strategicPatches[2]
          pattern: "name: kommodity-autobootstrap"

  - it: should include autoBootstrap extension when autoBootstrap.enabled value is true
    template: templates/talos/controlplane.yaml
    set:
      talos.autoBootstrap.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - exists:
          path: spec.controlPlaneConfig.controlplane.strategicPatches
      - matchRegex:
          path: spec.controlPlaneConfig.controlplane.strategicPatches[2]
          pattern: "name: kommodity-autobootstrap"

  - it: should not include autoBootstrap extension when kommodity.network.ipv4.public is true and talos.autoBootstrap.enabled is not set
    template: templates/talos/controlplane.yaml
    set:
      kommodity.network.ipv4.public: true
      talos.autoBootstrap.enabled: null
    asserts:
      - hasDocuments:
          count: 1
      - exists:
          path: spec.controlPlaneConfig.controlplane.strategicPatches
      - not: true
        matchRegex:
          path: spec.controlPlaneConfig.controlplane.strategicPatches[0]
          pattern: "kommodity-autobootstrap"
      - not: true
        matchRegex:
          path: spec.controlPlaneConfig.controlplane.strategicPatches[1]
          pattern: "kommodity-autobootstrap"
      - notExists:
          path: spec.controlPlaneConfig.controlplane.strategicPatches[2]

  # Test Kubernetes version precedence
  - it: should make sure Kubernetes version defined in controlplane's config takes precedence
    template: templates/talos/controlplane.yaml
    set:
      kubernetes.version: "global-kubernetes-version"
      kommodity.controlplane.kubernetes.version: "controlplane-kubernetes-version"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.version
          value: "controlplane-kubernetes-version"
