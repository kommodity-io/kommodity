suite: test creation of resources for Scaleway cluster
values:
  - ../values.scaleway.yaml
release:
  name: test-cluster
  namespace: default
templates:
  - templates/*
tests:
  - it: should make sure a Cluster is created
    template: templates/provider/capi/cluster.yaml
    asserts:
      - isKind:
          of: Cluster
      - equal:
          path: spec.infrastructureRef.kind
          value: ScalewayCluster
      - hasDocuments:
          count: 1
  - it: should create a single unsuffixed MachineDeployment when the nodepool has no zones
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.zones: null
    asserts:
      - isKind:
          of: MachineDeployment
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: "test-cluster-worker-default"
        documentIndex: 0
      - notExists:
          path: spec.template.spec.failureDomain
        documentIndex: 0
      - equal:
          path: spec.template.spec.infrastructureRef.kind
          value: ScalewayMachineTemplate
        documentIndex: 0

  - it: should fan out one MachineDeployment per nodepool zone
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.zones:
        - fr-par-1
        - fr-par-2
    asserts:
      - isKind:
          of: MachineDeployment
      # The default nodepool spans fr-par-1 and fr-par-2, so it fans out into two MachineDeployments.
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: "test-cluster-worker-default-fr-par-1"
        documentIndex: 0
      - equal:
          path: metadata.name
          value: "test-cluster-worker-default-fr-par-2"
        documentIndex: 1
  - it: should make sure a ScalewayCluster is created
    template: templates/provider/scaleway/cluster.yaml
    asserts:
      - isKind:
          of: ScalewayCluster
      - hasDocuments:
          count: 1
  - it: should make sure ScalewayMachineTemplates are created for controlplane and nodepools
    template: templates/provider/scaleway/machinetemplate.yaml
    asserts:
      - isKind:
          of: ScalewayMachineTemplate
      - hasDocuments:
          count: 2
      - matchRegex:
          path: metadata.name
          pattern: ^test-cluster-controlplane-[a-f0-9]{6}$
        documentIndex: 0
      - matchRegex:
          path: metadata.name
          pattern: ^test-cluster-worker-default-[a-f0-9]{6}$
        documentIndex: 1
  # Private network tests
  - it: should create a private network and public gateway when ipv4.public is false
    template: templates/provider/scaleway/cluster.yaml
    set:
      kommodity.network.ipv4.public: false
      kommodity.network.ipv4.nodeCIDR: "10.200.0.0/20"
    asserts:
      - equal:
          path: spec.network.privateNetwork.enabled
          value: true
      - equal:
          path: spec.network.privateNetwork.subnet
          value: "10.200.0.0/20"
      - isNotEmpty:
          path: spec.network.publicGateways
      - equal:
          path: spec.network.publicGateways[0].type
          value: "VPC-GW-S"
      - notExists:
          path: spec.network.publicGateways[0].zone
      - notExists:
          path: spec.network.publicGateways[0].ip

  - it: should use custom public gateway settings when configured
    template: templates/provider/scaleway/cluster.yaml
    set:
      kommodity.network.ipv4.public: false
      kommodity.network.ipv4.nodeCIDR: "10.200.0.0/20"
      kommodity.network.publicGateway.type: "VPC-GW-M"
      kommodity.network.publicGateway.zone: "fr-par-1"
      kommodity.network.publicGateway.ip: "1.2.3.4"
    asserts:
      - equal:
          path: spec.network.publicGateways[0].type
          value: "VPC-GW-M"
      - equal:
          path: spec.network.publicGateways[0].zone
          value: "fr-par-1"
      - equal:
          path: spec.network.publicGateways[0].ip
          value: "1.2.3.4"

  - it: should fail when ipv4.public is false and nodeCIDR is not set
    template: templates/provider/scaleway/cluster.yaml
    set:
      kommodity.network.ipv4.public: false
      kommodity.network.ipv4.nodeCIDR: null
    asserts:
      - failedTemplate:
          errorMessage: "missing required nodeCIDR in kommodity.network.ipv4"

  - it: should not create a private network when ipv4.public is true
    template: templates/provider/scaleway/cluster.yaml
    set:
      kommodity.network.ipv4.public: true
    asserts:
      - notExists:
          path: spec.network

  - it: should create MachineDeployments for multiple nodepools
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.zones:
        - fr-par-1
        - fr-par-2
      kommodity.nodepools.gpu.replicas: 2
      kommodity.nodepools.gpu.sku: "GPU-LARGE"
      kommodity.nodepools.gpu.zones:
        - fr-par-2
      kommodity.nodepools.gpu.os.disk.size: 50
    asserts:
      # default fans out across its two zones; gpu is single-zone (one MachineDeployment).
      - hasDocuments:
          count: 3
      - equal:
          path: metadata.name
          value: "test-cluster-worker-default-fr-par-1"
        documentIndex: 0
      - equal:
          path: metadata.name
          value: "test-cluster-worker-default-fr-par-2"
        documentIndex: 1
      - equal:
          path: metadata.name
          value: "test-cluster-worker-gpu-fr-par-2"
        documentIndex: 2
      - equal:
          path: spec.replicas
          value: 2
        documentIndex: 2

  - it: should suffix the zone and pin failureDomain for a single-zone nodepool
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.zones:
        - fr-par-1
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: "test-cluster-worker-default-fr-par-1"
        documentIndex: 0
      - equal:
          path: spec.template.spec.failureDomain
          value: "fr-par-1"
        documentIndex: 0

  - it: should fan out one MachineDeployment per zone and split replicas evenly
    template: templates/provider/capi/machinedeployment.yaml
    set:
      kommodity.nodepools.default.replicas: 5
      kommodity.nodepools.default.zones:
        - fr-par-1
        - fr-par-2
    asserts:
      - hasDocuments:
          count: 2
      # Remainder is front-loaded: 5 replicas over 2 zones -> 3 + 2.
      - equal:
          path: spec.template.spec.failureDomain
          value: "fr-par-1"
        documentIndex: 0
      - equal:
          path: spec.replicas
          value: 3
        documentIndex: 0
      - equal:
          path: spec.template.spec.failureDomain
          value: "fr-par-2"
        documentIndex: 1
      - equal:
          path: spec.replicas
          value: 2
        documentIndex: 1

  - it: should set ScalewayCluster failureDomains from controlplane zones
    template: templates/provider/scaleway/cluster.yaml
    set:
      kommodity.controlplane.zones:
        - fr-par-1
        - fr-par-2
    asserts:
      - contains:
          path: spec.failureDomains
          content: fr-par-1
      - contains:
          path: spec.failureDomains
          content: fr-par-2

  - it: should omit ScalewayCluster failureDomains when controlplane has no zones
    template: templates/provider/scaleway/cluster.yaml
    asserts:
      - notExists:
          path: spec.failureDomains
