suite: test creation of resources for Cloud Controller Manager
release:
  name: test-cluster
  namespace: default
templates:
  - templates/ccm-crs.yaml
tests:
  - it: should not render any CCM resource when cloudControllerManager is disabled
    template: templates/ccm-crs.yaml
    values:
      - ../values.kubevirt.yaml
    set:
      kommodity.network.ipv4.nodeCIDR: "10.200.0.0/20"
      kommodity.provider.cloudControllerManager.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ConfigMap and ClusterResourceSet for Kubevirt
    template: templates/ccm-crs.yaml
    values:
      - ../values.kubevirt.yaml
    set:
      kommodity.network.ipv4.nodeCIDR: "10.200.0.0/20"
    asserts:
      - hasDocuments:
          count: 2
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: test-cluster-ccm-manifests
          namespace: default
        documentIndex: 0
      - containsDocument:
          kind: ClusterResourceSet
          apiVersion: addons.cluster.x-k8s.io/v1beta1
          name: test-cluster-ccm
          namespace: default
        documentIndex: 1

  - it: should render ConfigMap and ClusterResourceSet for Scaleway
    template: templates/ccm-crs.yaml
    values:
      - ../values.scaleway.yaml
    asserts:
      - hasDocuments:
          count: 2
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: test-cluster-ccm-manifests
          namespace: default
        documentIndex: 0
      - containsDocument:
          kind: ClusterResourceSet
          apiVersion: addons.cluster.x-k8s.io/v1beta1
          name: test-cluster-ccm
          namespace: default
        documentIndex: 1

  - it: should label the ConfigMap with the cluster name
    template: templates/ccm-crs.yaml
    values:
      - ../values.kubevirt.yaml
    set:
      kommodity.network.ipv4.nodeCIDR: "10.200.0.0/20"
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - equal:
          path: metadata.labels["cluster.x-k8s.io/cluster-name"]
          value: test-cluster
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: kommodity

  - it: should set CRS strategy to Reconcile and select by cluster-name label
    template: templates/ccm-crs.yaml
    values:
      - ../values.kubevirt.yaml
    set:
      kommodity.network.ipv4.nodeCIDR: "10.200.0.0/20"
    documentSelector:
      path: kind
      value: ClusterResourceSet
    asserts:
      - equal:
          path: spec.strategy
          value: Reconcile
      - equal:
          path: spec.clusterSelector.matchLabels["cluster.x-k8s.io/cluster-name"]
          value: test-cluster

  - it: should reference ConfigMap and Secret as CRS resources
    template: templates/ccm-crs.yaml
    values:
      - ../values.kubevirt.yaml
    set:
      kommodity.network.ipv4.nodeCIDR: "10.200.0.0/20"
    documentSelector:
      path: kind
      value: ClusterResourceSet
    asserts:
      - contains:
          path: spec.resources
          content:
            kind: ConfigMap
            name: test-cluster-ccm-manifests
      - contains:
          path: spec.resources
          content:
            kind: Secret
            name: test-cluster-ccm-secret

  - it: should embed the Kubevirt CCM image from values
    template: templates/ccm-crs.yaml
    values:
      - ../values.kubevirt.yaml
    set:
      kommodity.network.ipv4.nodeCIDR: "10.200.0.0/20"
      kommodity.provider.cloudControllerManager.image.repository: quay.io/kubevirt/kubevirt-cloud-controller-manager
      kommodity.provider.cloudControllerManager.image.tag: v9.9.9
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "image: quay.io/kubevirt/kubevirt-cloud-controller-manager:v9.9.9"

  - it: should embed all Azure CCM images (controller, node-manager, init) from values
    template: templates/ccm-crs.yaml
    values:
      - ../values.azure.yaml
    set:
      kommodity.provider.cloudControllerManager.image.repository: myreg.example.com/ccm
      kommodity.provider.cloudControllerManager.image.tag: t1
      kommodity.provider.cloudControllerManager.nodeManager.image.repository: myreg.example.com/nodemgr
      kommodity.provider.cloudControllerManager.nodeManager.image.tag: t2
      kommodity.provider.cloudControllerManager.initImage.repository: myreg.example.com/kubectl
      kommodity.provider.cloudControllerManager.initImage.tag: t3
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "image: myreg.example.com/ccm:t1"
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "image: myreg.example.com/nodemgr:t2"
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "image: myreg.example.com/kubectl:t3"

  - it: should default the Azure CCM images when not overridden
    template: templates/ccm-crs.yaml
    values:
      - ../values.azure.yaml
    set:
      kommodity.provider.cloudControllerManager.nodeManager: null
      kommodity.provider.cloudControllerManager.initImage: null
      kommodity.provider.cloudControllerManager.image: null
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "image: mcr.microsoft.com/oss/kubernetes/azure-cloud-node-manager:v1.34.3"
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "image: registry.k8s.io/kubectl:v1.35.3"
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "image: mcr.microsoft.com/oss/kubernetes/azure-cloud-controller-manager:v1.34.3"

  - it: should embed Azure CCM component resources from values
    template: templates/ccm-crs.yaml
    values:
      - ../values.azure.yaml
    set:
      kommodity.provider.cloudControllerManager.resources.requests.cpu: 111m
      kommodity.provider.cloudControllerManager.resources.limits.memory: 3Gi
      kommodity.provider.cloudControllerManager.nodeManager.resources.requests.cpu: 22m
      kommodity.provider.cloudControllerManager.nodeManager.resources.limits.memory: 333Mi
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "cpu: 111m"
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "memory: 3Gi"
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "cpu: 22m"
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "memory: 333Mi"

  - it: should default Azure CCM component resources when not overridden
    template: templates/ccm-crs.yaml
    values:
      - ../values.azure.yaml
    set:
      kommodity.provider.cloudControllerManager.resources: null
      kommodity.provider.cloudControllerManager.nodeManager: null
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "memory: 2Gi"
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "memory: 512Mi"

  - it: should embed the Scaleway CCM image from values
    template: templates/ccm-crs.yaml
    values:
      - ../values.scaleway.yaml
    set:
      kommodity.provider.cloudControllerManager.image.repository: scaleway/scaleway-cloud-controller-manager
      kommodity.provider.cloudControllerManager.image.tag: v9.9.9
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "image: scaleway/scaleway-cloud-controller-manager:v9.9.9"

  - it: should embed the Kubevirt cloud-config namespace from values
    template: templates/ccm-crs.yaml
    values:
      - ../values.kubevirt.yaml
    set:
      kommodity.network.ipv4.nodeCIDR: "10.200.0.0/20"
      kommodity.provider.config.infraClusterNamespace: my-infra-ns
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - matchRegex:
          path: data["ccm.yaml"]
          pattern: "namespace: my-infra-ns"

  - it: should fail when CCM is enabled for a provider with no vendored manifest
    template: templates/ccm-crs.yaml
    set:
      kommodity.provider.name: Docker
      kommodity.provider.cloudControllerManager.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: 'Cloud Controller Manager is enabled but no manifest is shipped for provider "Docker" (looked for files/docker-ccm.yaml)'
