{{- $extraSecrets := .Values.kommodity.extraSecrets }}
{{- if $extraSecrets }}
---
# CRS-payload Secret: CAPI's ClusterResourceSet controller reads each entry of
# `data` (base64-decoded) as a workload-cluster manifest. We emit `data` (not
# `stringData`) because the management apiserver does not normalize stringData
# into data on persist, so the CRS controller would otherwise see empty data.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-kommodity-extra-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: kommodity
type: addons.cluster.x-k8s.io/resource-set
data:
{{- range $namespace, $secrets := $extraSecrets }}
{{- range $secretName, $secret := $secrets }}
{{- $hasData := hasKey $secret "data" }}
{{- $hasStringData := hasKey $secret "stringData" }}
{{- if and $hasData $hasStringData }}
{{- fail (printf "Secret '%s' in namespace '%s' cannot have both 'data' and 'stringData' defined" $secretName $namespace) }}
{{- end }}
{{- $labels := merge (dict
    "cluster.x-k8s.io/cluster-name" $.Release.Name
    "app.kubernetes.io/managed-by"  "kommodity"
  ) (default dict $secret.labels) }}
{{- $inner := dict
    "apiVersion" "v1"
    "kind"       "Secret"
    "metadata"   (dict
      "name"      $secretName
      "namespace" $namespace
      "labels"    $labels
    )
    "type"       (default "Opaque" $secret.type)
}}
{{- if $hasData }}
{{- $_ := set $inner "data" $secret.data }}
{{- else if $hasStringData }}
{{- $_ := set $inner "stringData" $secret.stringData }}
{{- end }}
  {{ printf "%s-%s" $namespace $secretName }}: {{ toYaml $inner | b64enc }}
{{- end }}
{{- end }}
---
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: {{ .Release.Name }}-kommodity-extra-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: kommodity
spec:
  strategy: Reconcile
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
  resources:
    - kind: Secret
      name: {{ .Release.Name }}-kommodity-extra-secrets
{{- end }}
