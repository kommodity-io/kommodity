{{- $extraSecrets := .Values.kommodity.extraSecrets }}
{{- if $extraSecrets }}
---
# CRS-payload Secret: CAPI's ClusterResourceSet controller treats each entry in
# `stringData` as a manifest and applies it to the workload cluster.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-kommodity-extra-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: kommodity
type: addons.cluster.x-k8s.io/resource-set
stringData:
{{- range $namespace, $secrets := $extraSecrets }}
{{- range $secretName, $secret := $secrets }}
{{- $type := (default "Opaque" $secret.type) }}
{{- $hasData := $secret.data }}
{{- $hasStringData := $secret.stringData }}
{{- if and $hasData $hasStringData }}
{{- fail (printf "Secret '%s' in namespace '%s' cannot have both 'data' and 'stringData' defined" $secretName $namespace) }}
{{- else }}
{{- $secretNamespaceName := printf "%s-%s" $namespace $secretName }}
  {{ $secretNamespaceName }}: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: {{ $secretName }}
      namespace: {{ $namespace }}
      labels:
        cluster.x-k8s.io/cluster-name: {{ $.Release.Name }}
        app.kubernetes.io/managed-by: kommodity
        {{- with $secret.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    type: {{ $type }}
    {{- if $hasData }}
    data:
    {{- range $key, $value := $secret.data }}
      {{ $key }}: {{ $value | b64enc }}
    {{- end }}
    {{- else if $hasStringData }}
    stringData:
    {{- range $key, $value := $secret.stringData }}
      {{ $key }}: {{ $value }}
    {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
---
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: {{ .Release.Name }}-kommodity-extra-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: kommodity
spec:
  strategy: Reconcile
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
  resources:
    - kind: Secret
      name: {{ .Release.Name }}-kommodity-extra-secrets
{{- end }}
