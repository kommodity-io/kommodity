{{- if eq .Values.kommodity.provider.name "Kubevirt" }}
{{- $ifType := dig "network" "cluster" "interfaceType" "bridge" .Values.kommodity }}
{{- $defaultStorageClass := dig "provider" "config" "storageClassName" "" .Values.kommodity -}}
{{- $cpSku := dig "sku" "" .Values.kommodity.controlplane -}}
{{- $cpResources := dig "resources" "" .Values.kommodity.controlplane -}}
{{- if and $cpSku $cpResources -}}
{{- fail "kommodity.controlplane: 'sku' and 'resources' are mutually exclusive; set exactly one" -}}
{{- end -}}
{{- if not (or $cpSku $cpResources) -}}
{{- fail "kommodity.controlplane: one of 'sku' or 'resources' must be set" -}}
{{- end -}}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: {{ .Release.Name }}-controlplane-{{ include "kommodity-cluster.machineSpecsHash" (dict "poolValues" .Values.kommodity.controlplane "allValues" .Values) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: kommodity
spec:
  template:
    spec:
      virtualMachineBootstrapCheck:
        checkStrategy: none
      virtualMachineTemplate:
        metadata:
          namespace: {{ .Values.kommodity.provider.config.infraClusterNamespace }}
        spec:
          dataVolumeTemplates:
            - metadata:
                name: boot-volume
                namespace: {{ $.Values.kommodity.provider.config.infraClusterNamespace }}
              spec:
                pvc:
                  resources:
                    requests:
                      storage: {{ .Values.kommodity.controlplane.os.disk.size }}Gi
                  accessModes:
                    - ReadWriteOnce
                  {{- if hasKey .Values.kommodity.provider.config "storageClassName" }}
                  storageClassName: {{ .Values.kommodity.provider.config.storageClassName }}
                  {{- end }}
                  volumeMode: Filesystem
                source:
                  registry:
                    url: {{ default $.Values.talos.imageName (dig "talos" "imageName" "" .Values.kommodity.controlplane) }}
          {{- if $cpSku }}
          instancetype:
            name: {{ $cpSku }}
            kind: VirtualMachineClusterInstancetype
          {{- end }}
          runStrategy: Always
          template:
            spec:
              {{- with (dig "network" "cluster" "dns" "dnsPolicy" "" $.Values.kommodity) }}
              dnsPolicy: {{ . }}
              {{- end }}
              {{- with (dig "network" "cluster" "dns" "dnsConfig" "" $.Values.kommodity) }}
              dnsConfig:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              networks:
                - name: default
                  pod: {}
              domain:
                {{- if $cpResources }}
                resources:
                  {{- toYaml $cpResources | nindent 18 }}
                {{- end }}
                devices:
                  interfaces:
                    - name: default
                      {{ $ifType }}: {}
                  networkInterfaceMultiqueue: true
                  disks:
                    - disk:
                        bus: virtio
                      name: dv-volume
              evictionStrategy: External
              volumes:
                - dataVolume:
                    name: boot-volume
                  name: dv-volume

{{- range $name, $np := .Values.kommodity.nodepools }}
{{- $npSku := dig "sku" "" $np -}}
{{- $npResources := dig "resources" "" $np -}}
{{- if and $npSku $npResources -}}
{{- fail (printf "kommodity.nodepools.%s: 'sku' and 'resources' are mutually exclusive; set exactly one" $name) -}}
{{- end -}}
{{- if not (or $npSku $npResources) -}}
{{- fail (printf "kommodity.nodepools.%s: one of 'sku' or 'resources' must be set" $name) -}}
{{- end }}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: {{ $.Release.Name }}-worker-{{ $name }}-{{ include "kommodity-cluster.machineSpecsHash" (dict "poolValues" $np "allValues" $.Values) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: kommodity
spec:
  template:
    spec:
      virtualMachineBootstrapCheck:
        checkStrategy: none
      virtualMachineTemplate:
        metadata:
          namespace: {{ $.Values.kommodity.provider.config.infraClusterNamespace }}
        spec:
          dataVolumeTemplates:
            - metadata:
                name: boot-volume
                namespace: {{ $.Values.kommodity.provider.config.infraClusterNamespace }}
              spec:
                pvc:
                  resources:
                    requests:
                      storage: {{ $np.os.disk.size }}Gi
                  accessModes:
                    - ReadWriteOnce
                  {{- if hasKey $.Values.kommodity.provider.config "storageClassName" }}
                  storageClassName: {{ $.Values.kommodity.provider.config.storageClassName }}
                  {{- end }}
                  volumeMode: Filesystem
                source:
                  registry:
                    url: {{ default $.Values.talos.imageName (dig "talos" "imageName" "" $np) }}
            {{- range $idx, $vol := $np.additionalVolumes }}
            {{- $volStorageClass := default $defaultStorageClass (dig "storageClassName" "" $vol) }}
            - metadata:
                name: additional-volume-{{ $idx }}
                namespace: {{ $.Values.kommodity.provider.config.infraClusterNamespace }}
              spec:
                pvc:
                  resources:
                    requests:
                      storage: {{ $vol.size }}Gi
                  accessModes:
                    - ReadWriteOnce
                  {{- if $volStorageClass }}
                  storageClassName: {{ $volStorageClass }}
                  {{- end }}
                  volumeMode: Filesystem
                source:
                  blank: {}
            {{- end }}
          {{- if $npSku }}
          instancetype:
            name: {{ $npSku }}
            kind: VirtualMachineClusterInstancetype
          {{- end }}
          runStrategy: Always
          template:
            spec:
              {{- with (dig "network" "cluster" "dns" "dnsPolicy" "" $.Values.kommodity) }}
              dnsPolicy: {{ . }}
              {{- end }}
              {{- with (dig "network" "cluster" "dns" "dnsConfig" "" $.Values.kommodity) }}
              dnsConfig:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              networks:
                - name: default
                  pod: {}
              domain:
                {{- if $npResources }}
                resources:
                  {{- toYaml $npResources | nindent 18 }}
                {{- end }}
                devices:
                  interfaces:
                    - name: default
                      {{ $ifType }}: {}
                  {{- if $np.gpus }}
                  gpus:
                  {{- range $name, $gpu := $np.gpus }}
                    - name: {{ $name }}
                      deviceName: {{ $gpu.deviceName }}
                  {{- end }}
                  {{- end }}
                  networkInterfaceMultiqueue: true
                  disks:
                    - disk:
                        bus: virtio
                      name: dv-volume
                    {{- range $idx, $vol := $np.additionalVolumes }}
                    - disk:
                        bus: virtio
                      name: additional-volume-{{ $idx }}
                    {{- end }}
              evictionStrategy: External
              volumes:
                - dataVolume:
                    name: boot-volume
                  name: dv-volume
                {{- range $idx, $vol := $np.additionalVolumes }}
                - dataVolume:
                    name: additional-volume-{{ $idx }}
                  name: additional-volume-{{ $idx }}
                {{- end }}
{{- end }}
{{- end }}
