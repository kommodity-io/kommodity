{{- if .Values.kommodity.provider.cloudControllerManager.enabled }}
{{- $provider := lower .Values.kommodity.provider.name }}
{{- $manifestPath := printf "files/provider/%s/ccm.yaml" $provider }}
{{- $manifest := .Files.Get $manifestPath }}
{{- if not $manifest }}
{{- fail (printf "Cloud Controller Manager is enabled but no manifest is shipped for provider %q (looked for %s)" .Values.kommodity.provider.name $manifestPath) }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-ccm-manifests
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: kommodity
    cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
data:
  ccm.yaml: |
{{ tpl $manifest . | indent 4 }}
---
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: {{ .Release.Name }}-ccm
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: kommodity
    cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
spec:
  strategy: Reconcile
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
  resources:
    - kind: ConfigMap
      name: {{ .Release.Name }}-ccm-manifests
    - kind: Secret
      name: {{ .Release.Name }}-ccm-secret
{{- end }}
