{{- range $name, $np := .Values.kommodity.nodepools }}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: {{ $.Release.Name }}-worker-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: kommodity
{{- if or (dig "autoscaling" "minReplicas" "" $np) (dig "autoscaling" "maxReplicas" "" $np) }}
{{- if not (and (dig "autoscaling" "minReplicas" "" $np) (dig "autoscaling" "maxReplicas" "" $np)) }}
{{- fail (printf "nodepool %s: both autoscaling.minReplicas and autoscaling.maxReplicas must be set together" $name) }}
{{- end }}
  annotations:
    cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: {{ $np.autoscaling.minReplicas | quote }}
    cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: {{ $np.autoscaling.maxReplicas | quote }}
{{- end }}
spec:
  clusterName: {{ $.Release.Name }}
  minReadySeconds: 0
  progressDeadlineSeconds: 600
{{- if and $np.replicas (or (dig "autoscaling" "minReplicas" "" $np) (dig "autoscaling" "maxReplicas" "" $np)) }}
{{- fail (printf "nodepool %s: replicas cannot be set together with autoscaling.minReplicas or autoscaling.maxReplicas" $name) }}
{{- end }}
{{- if $np.replicas }}
  replicas: {{ $np.replicas }}
{{- end }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels: null
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: {{ $.Release.Name }}
        cluster.x-k8s.io/deployment-name: {{ $.Release.Name }}-worker-{{ $name }}
        app.kubernetes.io/managed-by: kommodity
    spec:
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
          kind: TalosConfigTemplate
          name: {{ $.Release.Name }}-worker-{{ $name }}-{{ include "kommodity-cluster.talosConfigHash" (dict "poolValues" $np "allValues" $.Values) }}
          namespace: {{ $.Release.Namespace }}
      clusterName: {{ $.Release.Name }}
      failureDomain: {{ $np.zone }}
      infrastructureRef:
        {{- if not $.Values.kommodity.provider.name }}
        {{- fail "kommodity.provider.name must be set in values.yaml" -}}
        {{- else if eq $.Values.kommodity.provider.name "Docker" }}
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: DockerMachineTemplate
        {{- else if eq $.Values.kommodity.provider.name "Scaleway" }}
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: ScalewayMachineTemplate
        {{- else if eq $.Values.kommodity.provider.name "Kubevirt" }}
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: KubevirtMachineTemplate
        {{- else }}
        {{- fail "infrastructure provider is not supported" -}}
        {{- end }}
        name: {{ $.Release.Name }}-worker-{{ $name }}-{{ include "kommodity-cluster.machineSpecsHash" (dict "poolValues" $np "allValues" $.Values) }}
        namespace: {{ $.Release.Namespace }}
      version: {{ default $.Values.kubernetes.version (dig "kubernetes" "version" "" $np) -}}
{{- end }}
