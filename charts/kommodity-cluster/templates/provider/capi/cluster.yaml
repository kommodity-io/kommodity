{{- $tcp := index .Values.kommodity.addons "talos-cluster-proxy" }}
{{- if and $tcp $tcp.enabled .Values.kommodity.network.ipv4.enabled (not (default false .Values.kommodity.network.ipv4.public)) (not .Values.kommodity.network.ipv4.nodeCIDR) }}
{{- fail "kommodity.network.ipv4.nodeCIDR must be set when the talos-cluster-proxy addon is enabled on a private IPv4 network (proxy uses it to identify valid Talos node targets)" }}
{{- end }}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: kommodity
    cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
  {{- $annotations := dict }}
  {{- if and .Values.kommodity.network.ipv4.enabled (not (default false .Values.kommodity.network.ipv4.public)) .Values.kommodity.network.ipv4.nodeCIDR }}
  {{- $_ := set $annotations "kommodity.io/node-cidr" .Values.kommodity.network.ipv4.nodeCIDR }}
  {{- end }}
  {{- if .Values.kommodity.provider.cloudControllerManager.enabled }}
  {{- $_ := set $annotations "kommodity.io/ccm-secret-name" .Values.kommodity.provider.secret.name }}
  {{- if eq .Values.kommodity.provider.name "Kubevirt" }}
  {{- $_ := set $annotations "kommodity.io/ccm-downstream-secret-name" "kubevirt-cloud-controller-manager" }}
  {{- else if eq .Values.kommodity.provider.name "Scaleway" }}
  {{- $_ := set $annotations "kommodity.io/ccm-downstream-secret-name" "scaleway-secret" }}
  {{- end }}
  {{- end }}
  {{- if .Values.kommodity.clusterAutoscaler.enabled }}
  {{- $_ := set $annotations "kommodity.io/autoscaler-sa-secret-name" (printf "%s-cluster-autoscaler" .Release.Name) }}
  {{- end }}
  {{- if $annotations }}
  annotations:
    {{- range $k, $v := $annotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- end }}
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      {{- range $cidr := .Values.kommodity.network.cluster.podCIDR }}
        - {{ $cidr }}
      {{- end }}
    services:
      cidrBlocks:
      {{- range $cidr := .Values.kommodity.network.cluster.serviceCIDR }}
        - {{ $cidr }}
      {{- end }}
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1alpha3
    kind: TalosControlPlane
    name: {{ .Release.Name }}-controlplane
    namespace: {{ .Release.Namespace }}
  infrastructureRef:
    {{- if not .Values.kommodity.provider.name }}
    {{- fail "kommodity.provider.name must be set in values.yaml" -}}
    {{- else if eq .Values.kommodity.provider.name "Docker" }}
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: DockerCluster
    {{- else if eq .Values.kommodity.provider.name "Scaleway" }}
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: ScalewayCluster
    {{- else if eq .Values.kommodity.provider.name "Kubevirt" }}
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubevirtCluster
    {{- else }}
    {{- fail "infrastructure provider is not supported" -}}
    {{- end }}
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
