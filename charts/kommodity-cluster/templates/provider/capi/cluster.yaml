{{- $tcp := index .Values.kommodity.addons "talos-cluster-proxy" }}
{{- /*
  Node VMs are "private" (no public IP, Talos API reachable only via the
  talos-cluster-proxy tunnel) when the network is not public — and ALWAYS on
  Azure, where the `public` flag controls the apiServerLB type only and node
  VMs never receive public IPs.  Whenever nodes are private and the proxy addon
  is enabled, kommodity.io/node-cidr must be set so the proxy can identify which
  IPs to route through the tunnel instead of direct-dialing them.
*/}}
{{- $isAzure := eq .Values.kommodity.provider.name "Azure" }}
{{- $nodesPrivate := or (not (default false .Values.kommodity.network.ipv4.public)) $isAzure }}
{{- if and $tcp $tcp.enabled .Values.kommodity.network.ipv4.enabled $nodesPrivate (not .Values.kommodity.network.ipv4.nodeCIDR) }}
{{- fail "kommodity.network.ipv4.nodeCIDR must be set when the talos-cluster-proxy addon is enabled and node VMs are private (always on Azure; private IPv4 networks elsewhere). The proxy uses it to identify valid Talos node targets." }}
{{- end }}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: kommodity
    cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
  {{- $annotations := dict }}
  {{- if and .Values.kommodity.network.ipv4.enabled $nodesPrivate .Values.kommodity.network.ipv4.nodeCIDR }}
  {{- $_ := set $annotations "kommodity.io/node-cidr" .Values.kommodity.network.ipv4.nodeCIDR }}
  {{- end }}
  {{- if .Values.kommodity.provider.cloudControllerManager.enabled }}
  {{- if eq .Values.kommodity.provider.name "Azure" }}
  {{- /*
    Azure's CCM cloud-config Secret is materialized per cluster (not hand-created),
    so its management-side name defaults to <release>-cloud-provider — unique per
    release, letting multiple Azure clusters share one namespace without colliding.
    An explicit provider.secret.name overrides it (e.g. to point at a Secret you
    manage yourself). The downstream name inside each workload cluster is always
    azure-cloud-provider (separate clusters, no collision).
  */}}
  {{- $azureCCMSecret := dig "secret" "name" "" .Values.kommodity.provider | default (printf "%s-cloud-provider" .Release.Name) }}
  {{- $_ := set $annotations "kommodity.io/ccm-secret-name" $azureCCMSecret }}
  {{- $_ := set $annotations "kommodity.io/ccm-downstream-secret-name" "azure-cloud-provider" }}
  {{- else }}
  {{- $_ := set $annotations "kommodity.io/ccm-secret-name" .Values.kommodity.provider.secret.name }}
  {{- if eq .Values.kommodity.provider.name "Kubevirt" }}
  {{- $_ := set $annotations "kommodity.io/ccm-downstream-secret-name" "kubevirt-cloud-controller-manager" }}
  {{- else if eq .Values.kommodity.provider.name "Scaleway" }}
  {{- $_ := set $annotations "kommodity.io/ccm-downstream-secret-name" "scaleway-secret" }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- if $annotations }}
  annotations:
    {{- range $k, $v := $annotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- end }}
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      {{- range $cidr := .Values.kommodity.network.cluster.podCIDR }}
        - {{ $cidr }}
      {{- end }}
    services:
      cidrBlocks:
      {{- range $cidr := .Values.kommodity.network.cluster.serviceCIDR }}
        - {{ $cidr }}
      {{- end }}
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1alpha3
    kind: TalosControlPlane
    name: {{ .Release.Name }}-controlplane
    namespace: {{ .Release.Namespace }}
  infrastructureRef:
    {{- if not .Values.kommodity.provider.name }}
    {{- fail "kommodity.provider.name must be set in values.yaml" -}}
    {{- else if eq .Values.kommodity.provider.name "Docker" }}
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: DockerCluster
    {{- else if eq .Values.kommodity.provider.name "Scaleway" }}
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: ScalewayCluster
    {{- else if eq .Values.kommodity.provider.name "Kubevirt" }}
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubevirtCluster
    {{- else if eq .Values.kommodity.provider.name "Azure" }}
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AzureCluster
    {{- else }}
    {{- fail "infrastructure provider is not supported" -}}
    {{- end }}
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
