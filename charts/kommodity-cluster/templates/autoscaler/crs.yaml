{{- if .Values.kommodity.clusterAutoscaler.enabled }}
{{- $autoscalerNamespace := .Values.kommodity.clusterAutoscaler.namespace | default "kube-system" }}
{{- $kubeconfigSecretName := "kommodity-cluster-autoscaler-kubeconfig" }}
{{- $extraValuesSecretName := "cluster-autoscaler-extra-values" }}
{{- $override := dict
    "autoDiscovery" (dict
      "clusterName" .Release.Name
      "labels" (list (dict "cluster.x-k8s.io/cluster-name" .Release.Name))
    )
    "cloudProvider" "clusterapi"
    "clusterAPIMode" "kubeconfig-incluster"
    "extraArgs" (dict
      "node-group-auto-discovery" (printf "clusterapi:clusterName=%s,cluster.x-k8s.io/cluster-name=%s" .Release.Name .Release.Name)
    )
    "clusterAPIKubeconfigSecret" $kubeconfigSecretName
    "clusterAPICloudConfigPath" "/etc/kubernetes/value"
}}
{{- $extraValues := deepCopy (default dict .Values.kommodity.clusterAutoscaler.initialExtraValues) | merge $override }}
{{- /*
Tie the install Job (and its SA/CRB) name to a hash of (chart version + extra-values).
Job specs are immutable, so a value change requires a fresh Job name to actually re-run.
Old Jobs GC themselves via ttlSecondsAfterFinished.
*/}}
{{- $installSignature := printf "%s|%s" .Values.kommodity.clusterAutoscaler.chart.version (toYaml $extraValues) | sha256sum | trunc 10 }}
{{- $autoscalerFullName := printf "cluster-autoscaler-%s" $installSignature }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-autoscaler-manifests
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: kommodity
    cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
data:
  cluster-autoscaler.yaml: |
    ---
    # extra-values Secret consumed by the install Job via `helm install -f`.
    apiVersion: v1
    kind: Secret
    metadata:
      name: {{ $extraValuesSecretName }}
      namespace: {{ $autoscalerNamespace }}
    type: Opaque
    stringData:
      values.yaml: |
{{ toYaml $extraValues | indent 8 }}
    ---
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: {{ $autoscalerFullName }}-install
      namespace: {{ $autoscalerNamespace }}
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: {{ $autoscalerFullName }}-install
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
    subjects:
      - kind: ServiceAccount
        name: {{ $autoscalerFullName }}-install
        namespace: {{ $autoscalerNamespace }}
    ---
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: {{ $autoscalerFullName }}-install
      namespace: {{ $autoscalerNamespace }}
    spec:
      backoffLimit: 10
      ttlSecondsAfterFinished: 3600
      # manualSelector + explicit selector are required so CAPI's CRS Reconcile
      # strategy can re-apply this manifest without tripping Job's immutable
      # spec.selector validation. The selector label must also be present in
      # spec.template.metadata.labels.
      manualSelector: true
      selector:
        matchLabels:
          app.kubernetes.io/app: {{ $autoscalerFullName }}-install
      template:
        metadata:
          labels:
            kommodity.io/addon-name: cluster-autoscaler
            kommodity.io/addon-version: {{ .Values.kommodity.clusterAutoscaler.chart.version | squote }}
            app.kubernetes.io/managed-by: kommodity
            app.kubernetes.io/app: {{ $autoscalerFullName }}-install
        spec:
          restartPolicy: OnFailure
          tolerations:
            - operator: Exists
            - effect: NoSchedule
              operator: Exists
            - effect: NoExecute
              operator: Exists
            - effect: PreferNoSchedule
              operator: Exists
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: Exists
          serviceAccount: {{ $autoscalerFullName }}-install
          serviceAccountName: {{ $autoscalerFullName }}-install
          hostNetwork: true
          volumes:
            - name: extra-values
              secret:
                secretName: {{ $extraValuesSecretName }}
          containers:
            - name: install
              image: alpine/k8s:1.34.1
              volumeMounts:
                - name: extra-values
                  mountPath: /etc/cluster-autoscaler
              env:
                - name: KUBERNETES_SERVICE_HOST
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: status.podIP
                - name: KUBERNETES_SERVICE_PORT
                  value: "6443"
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  RELEASE="cluster-autoscaler"
                  NAMESPACE="{{ $autoscalerNamespace }}"
                  REPOSITORY="{{ .Values.kommodity.clusterAutoscaler.chart.repository }}"
                  CHART="{{ .Values.kommodity.clusterAutoscaler.chart.name }}"
                  VERSION="{{ .Values.kommodity.clusterAutoscaler.chart.version }}"
                  VALUES_FILE="/etc/cluster-autoscaler/values.yaml"

                  # `helm upgrade --install` is idempotent: installs on first run,
                  # upgrades on subsequent runs whenever values or chart version
                  # change. The CRS payload Job name itself is hashed off
                  # extraValues, so this Job only fires when an upgrade is needed.
                  helm upgrade --install "${RELEASE}" "${CHART}" \
                    --namespace "${NAMESPACE}" \
                    --repo "${REPOSITORY}" \
                    --version "${VERSION}" \
                    -f "${VALUES_FILE}"
---
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: {{ .Release.Name }}-autoscaler
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: kommodity
    cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
spec:
  strategy: Reconcile
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ .Release.Name }}
  resources:
    - kind: ConfigMap
      name: {{ .Release.Name }}-autoscaler-manifests
    - kind: Secret
      name: {{ .Release.Name }}-autoscaler-kubeconfig
{{- end }}
