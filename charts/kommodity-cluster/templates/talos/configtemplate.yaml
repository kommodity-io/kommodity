{{- range $name, $np := .Values.kommodity.nodepools }}
---
apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
kind: TalosConfigTemplate
metadata:
  name: {{ $.Release.Name }}-worker-{{ $name }}-{{ include "kommodity-cluster.talosConfigHash" (dict "poolValues" $np "allValues" $.Values) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: kommodity
spec:
  template:
    spec:
      generateType: worker
      talosVersion: {{ default (include "kommodity.talosVersion" $) (dig "talos" "version" "" $np) }}
      {{- /* Build merged MachineConfig strategic patch for workers */ -}}
      {{- $mergedPatch := include "kommodity-cluster.mergedStrategicPatch" (dict
        "globalPatches" $.Values.kommodity.global.strategicPatches
        "nodepoolPatches" $np.strategicPatches
        "taints" $np.taints
        "labels" $np.labels
        "annotations" $np.annotations
        "installer" $.Values.talos.installer
        "logLevel" $.Values.kommodity.logLevel
      ) | trim -}}
      {{- $needsStrategicPatches := or (not (empty $mergedPatch)) $.Values.kommodity.kms.enabled $.Values.kommodity.security.enabled }}
      {{- if $needsStrategicPatches }}
      strategicPatches:
      {{- if not (empty $mergedPatch) }}
{{ $mergedPatch | nindent 6 }}
      {{- end }}
      {{- if $.Values.kommodity.kms.enabled }}
      {{- /* VolumeConfig for disk encryption (Talos v1.12+) */ -}}
{{- include "kommodity.talos.volumeEncryption" (dict "endpoint" $.Values.kommodity.kms.endpoint) | nindent 6 }}
      {{- end }}
      {{- if $.Values.kommodity.security.enabled }}
      {{- /* ExtensionServiceConfig for kommodity-attestation extension */ -}}
{{- include "kommodity.talos.attestationExtensionServiceConfig" (dict "logLevel" $.Values.kommodity.logLevel) | nindent 6 }}
      {{- end }}
      {{- end }}
{{- end }}
