{{/*
VolumeConfig and UserVolumeConfig documents for KMS disk encryption.
These are used as strategic patches in TalosConfigTemplate and TalosControlPlane.
See: https://docs.siderolabs.com/talos/v1.12/reference/configuration/block/volumeconfig
See: https://docs.siderolabs.com/talos/v1.12/reference/configuration/block/uservolumeconfig
*/}}
{{- define "kommodity.talos.volumeEncryption" -}}
{{- $endpoint := required "kommodity.kms.endpoint is required when kms is enabled" .endpoint -}}
- |
  apiVersion: v1alpha1
  kind: VolumeConfig
  name: STATE
  # provisioning config is not allowed for the STATE volume
  encryption:
    provider: luks2
    keys:
      - slot: 0
        kms:
          endpoint: {{ $endpoint | quote }}
- |
  apiVersion: v1alpha1
  kind: VolumeConfig
  name: EPHEMERAL
  provisioning:
    diskSelector:
      match: 'system_disk'
  encryption:
    provider: luks2
    keys:
      - slot: 0
        kms:
          endpoint: {{ $endpoint | quote }}
{{- if .additionalVolumes }}
- |
  apiVersion: v1alpha1
  kind: UserVolumeConfig
  name: {{ $name }}
  provisioning:
    diskSelector:
      # Match a non-system disk of exactly the requested size (in GB).
      # The range [size, size+1) avoids type mismatch between int literals and the uint GB constant,
      # and ensures each UserVolumeConfig targets only its own disk when multiple additional volumes are configured.
      match: "disk.size >= uint({{ $vol.size }}) * GB && disk.size < uint({{ add $vol.size 1 }}) * GB && !system_disk"
    maxSize: {{ $vol.size }}GB
  encryption:
    provider: luks2
    keys:
      - slot: 0
        kms:
          endpoint: {{ $endpoint | quote }}
{{- end }}
{{- end -}}
