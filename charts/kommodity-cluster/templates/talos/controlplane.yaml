---
apiVersion: controlplane.cluster.x-k8s.io/v1alpha3
kind: TalosControlPlane
metadata:
  name: {{ $.Release.Name }}-controlplane
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: kommodity
spec:
  {{- if and (hasKey .Values.kommodity.controlplane "kubernetes") (hasKey .Values.kommodity.controlplane.kubernetes "version") }}
  version: {{ $.Values.kommodity.controlplane.kubernetes.version }}
  {{- else }}
  version: {{ $.Values.kubernetes.version }}
  {{- end }}
  replicas: {{ $.Values.kommodity.controlplane.replicas }}
  rolloutStrategy:
    rollingUpdate:
      maxSurge: 1
    type: RollingUpdate
  infrastructureTemplate:
    {{- if not $.Values.kommodity.provider.name }}
    {{- fail "kommodity.provider.name must be set in values.yaml" -}}
    {{- else if eq $.Values.kommodity.provider.name "Docker" }}
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: DockerMachineTemplate
    {{- else if eq $.Values.kommodity.provider.name "Scaleway" }}
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: ScalewayMachineTemplate
    {{- else if eq $.Values.kommodity.provider.name "Kubevirt" }}
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubevirtMachineTemplate
    {{- else if eq $.Values.kommodity.provider.name "Azure" }}
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AzureMachineTemplate
    {{- else }}
    {{- fail "infrastructure provider is not supported" -}}
    {{- end }}
    name: {{ .Release.Name }}-controlplane-{{ include "kommodity-cluster.machineSpecsHash" (dict "poolValues" .Values.kommodity.controlplane "allValues" .Values) }}
    namespace: {{ $.Release.Namespace }}
  controlPlaneConfig:
    controlplane:
      generateType: controlplane
      talosVersion: {{ default (include "kommodity.talosVersion" $) (dig "talos" "version" "" $.Values.kommodity.controlplane) }}
      hostname: {}
      {{- $cp := $.Values.kommodity.controlplane }}
      {{- $cpPatches := dig "strategicPatches" nil $cp }}
      {{- $globalPatches := dig "global" "strategicPatches" nil $.Values.kommodity }}
      {{- $cpTaints := dig "taints" nil $cp }}
      {{- $cpLabels := dig "labels" nil $cp }}
      {{- $cpAnnotations := dig "annotations" nil $cp }}
      {{- $oidc := dig "oidc" nil $.Values.kommodity }}
      {{- /* Build merged MachineConfig strategic patch */ -}}
      {{- $mergedPatch := include "kommodity-cluster.mergedStrategicPatch" (dict
        "globalPatches" $globalPatches
        "nodepoolPatches" $cpPatches
        "taints" $cpTaints
        "labels" $cpLabels
        "annotations" $cpAnnotations
        "oidc" $oidc
        "installer" $.Values.talos.installer
        "logLevel" $.Values.kommodity.logLevel
        "disableCNI" $.Values.talos.disableCNI
        "disableProxy" $.Values.talos.disableKubeProxy
        "ccmEnabled" (dig "provider" "cloudControllerManager" "enabled" false $.Values.kommodity)
      ) | trim -}}
      {{- $needsStrategicPatches := or (not (empty $mergedPatch)) $.Values.kommodity.kms.enabled (not $.Values.kommodity.network.ipv4.public) $.Values.talos.autoBootstrap.enabled $.Values.kommodity.security.enabled }}
      {{- if $needsStrategicPatches }}
      strategicPatches:
      {{- /* Merged MachineConfig patch (labels, taints, annotations, env, installer, OIDC, CNI, proxy, CCM, user patches) */ -}}
      {{- if not (empty $mergedPatch) }}
{{ $mergedPatch | nindent 6 }}
      {{- end }}
      {{- if $.Values.kommodity.kms.enabled }}
      {{- /* VolumeConfig for disk encryption (Talos v1.12+) */ -}}
{{- include "kommodity.talos.volumeEncryption" (dict "endpoint" $.Values.kommodity.kms.endpoint) | nindent 6 }}
      {{- end }}
      {{- if or (not $.Values.kommodity.network.ipv4.public) $.Values.talos.autoBootstrap.enabled }}
      {{- /* ExtensionServiceConfig for kommodity-autobootstrap extension */ -}}
{{- include "kommodity.talos.autoBootstrapExtensionServiceConfig" (dict "autoBootstrap" $.Values.talos.autoBootstrap "logLevel" $.Values.kommodity.logLevel) | nindent 6 }}
      {{- end }}
      {{- if $.Values.kommodity.security.enabled }}
      {{- /* ExtensionServiceConfig for kommodity-attestation extension */ -}}
{{- include "kommodity.talos.attestationExtensionServiceConfig" (dict "logLevel" $.Values.kommodity.logLevel) | nindent 6 }}
      {{- end }}
      {{- end }}
